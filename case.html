<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Counselling Hub</title>

<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>

<body>

<div class="container">

<h1>Counselling Hub</h1>

<div class="card">

<h2>Client Information</h2>

<input id="clientName" placeholder="Client Name">

<input id="age" type="number" placeholder="Age">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input id="sessionDate" type="date">

<select id="sessionDuration">
<option value="">Session Duration</option>
<option>15</option>
<option>30</option>
<option>45</option>
<option>60</option>
<option>90</option>
</select>

</div>

<div class="card">

<h2>Main Issues</h2>

<select id="issues" multiple></select>

</div>

<div class="card">

<h2>Sub Issues</h2>

<select id="subIssues" multiple></select>

</div>

<div class="card">

<h2>Knowledge Base</h2>

<select id="resources" multiple></select>

</div>

<div class="card">

<h2>Support Offered</h2>

<textarea id="supportOffered"></textarea>

<h2>Concluding Problems</h2>

<textarea id="concludingProblems"></textarea>

</div>

<div class="card">

<h2>Issue Remarks</h2>

<textarea id="issueRemarks"></textarea>

<h2>Resource Remarks</h2>

<textarea id="resourceRemarks"></textarea>

<h2>Counsellor Remarks</h2>

<textarea id="counsellorRemarks"></textarea>

<h2>General Remarks</h2>

<textarea id="generalRemarks"></textarea>

</div>

<div class="card">

<h2>Conclusion Of Case</h2>

<textarea id="caseSummary"></textarea>

</div>

<div class="card">

<label>
<input type="checkbox" id="followUpRequired">
Follow Up Required
</label>

<input type="date" id="followUpDate">

<select id="caseStatus">
<option>Open</option>
<option>Closed</option>
<option>Follow Up</option>
</select>

</div>

<button id="saveBtn">
Save Case
</button>

</div>

<script src="js/app.js"></script>

</body>
</html>
